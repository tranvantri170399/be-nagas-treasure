plugins {
    id 'application'
    alias(libs.plugins.spring.boot)
    alias(libs.plugins.lombok)
    id 'checkstyle'
    alias(libs.plugins.spotbugs)
    id 'pmd'
    alias(libs.plugins.protobuf)
    id 'com.diffplug.spotless' version '8.3.0'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()

    // Local libs directory for the Mario/Luigi GaaS common-data JAR
    // (PuObject + MessagePack extension codec used by wsproxy).
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    // Spring Boot
    implementation libs.spring.boot.starter.web
    implementation libs.spring.boot.starter.validation
    implementation libs.spring.boot.starter.data.mongodb
    implementation libs.spring.boot.starter.data.redis

    // JSON serialization (needed by Redis serializer)
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    // Development tools - Hot reload when code changes
    developmentOnly libs.spring.boot.devtools

    // Lombok
    compileOnly libs.lombok
    annotationProcessor libs.lombok

    // Testing
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // Spring Boot Test - using direct dependency to ensure it resolves
    testImplementation "org.springframework.boot:spring-boot-starter-test:${libs.versions.spring.boot.get()}"

    // Guava
    implementation libs.guava

    // RabbitMQ
    implementation libs.spring.boot.starter.amqp

    // gRPC — standalone server managed by StandaloneGrpcServerConfig.
    // We intentionally do NOT pull net.devh's spring-boot starter: no @GrpcService /
    // @GrpcClient is used, and its auto-config would spin up a parallel server process.
    implementation libs.grpc.stub
    implementation libs.grpc.protobuf
    implementation libs.grpc.netty
    implementation libs.protobuf.java
    implementation libs.protobuf.java.util
    implementation libs.javax.annotation.api

    // MessagePack — both generations are required:
    //   msgpack-core (0.9.x) for our encoder/decoder in MessagePackHelper
    //   msgpack (0.6.x legacy) is the runtime dep of Mario's PuObject codec
    implementation libs.msgpack.core
    implementation 'org.msgpack:msgpack:0.6.12'

    // Mario/Luigi GaaS PuObject + extension codec. Resolved from the flatDir
    // repo above (app/libs/common-data-1.0.0.jar). Build fails loud if absent.
    implementation name: 'common-data-1.0.0'

    // JSON Smart — runtime dep of Mario PuObject.
    implementation 'net.minidev:json-smart:2.4.11'

    // ZeroMQ
    implementation libs.jeromq

    implementation 'ch.qos.logback:logback-classic:1.5.6'
    implementation 'ch.qos.logback:logback-core:1.5.6'

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.2'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'asia.rgp.game.nagas.NagasApplication'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
    
    // Show test output in terminal
    testLogging {
        events "passed", "skipped", "failed", "standardOut", "standardError"
        showStandardStreams = true
        exceptionFormat = "full"
    }
}

// Checkstyle configuration
checkstyle {
    toolVersion = libs.versions.checkstyle.get()
    configFile = rootProject.file('config/quality/checkstyle.xml')
    ignoreFailures = false
    showViolations = true
}

tasks.named('checkstyleMain').configure {
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.named('checkstyleTest').configure {
    reports {
        xml.required = true
        html.required = true
    }
}

// SpotBugs configuration
spotbugs {
    ignoreFailures = true  // Set to false to fail build on SpotBugs violations
    effort = 'max'
    reportLevel = 'medium'
    // excludeFilter = file("${rootProject.projectDir}/config/quality/spotbugs-exclude.xml")  // Uncomment when needed
}

tasks.named('spotbugsMain').configure {
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.named('spotbugsTest').configure {
    reports {
        xml.required = true
        html.required = true
    }
}

// PMD configuration
pmd {
    toolVersion = libs.versions.pmd.get()
    ignoreFailures = true  // Set to false to fail build on PMD violations
    ruleSetFiles = files("${rootProject.projectDir}/config/quality/pmd-ruleset.xml")
    ruleSets = []
}

tasks.named('pmdMain').configure {
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.named('pmdTest').configure {
    reports {
        xml.required = true
        html.required = true
    }
}

// Make check depend on all quality checks
tasks.named('check').configure {
    dependsOn tasks.named('spotlessCheck')
    dependsOn tasks.named('checkstyleMain')
    dependsOn tasks.named('checkstyleTest')
    dependsOn tasks.named('spotbugsMain')
    dependsOn tasks.named('spotbugsTest')
    dependsOn tasks.named('pmdMain')
    dependsOn tasks.named('pmdTest')
}

spotless {
    java {
        // Only format real source
        target 'src/main/java/**/*.java', 'src/test/java/**/*.java'
        // Skip all build & generated code
        targetExclude 'build/**', '**/build/**', 'build/generated/**'

        googleJavaFormat()
    }
}

def grpcVersion = libs.versions.grpc.lib.get()
def protobufVersion = libs.versions.protobuf.get()

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:${protobufVersion}:${osdetector.classifier}"
    }
    plugins {
        grpc {
            artifact = "io.grpc:protoc-gen-grpc-java:${grpcVersion}:${osdetector.classifier}"
        }
    }
    generateProtoTasks {
        all().each { task ->
            task.plugins {
                grpc {}
            }
        }
    }
}