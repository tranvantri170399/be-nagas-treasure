# SonarLint / SonarQube Project Configuration
sonar.projectKey=game-nags
sonar.projectName=Game nags
sonar.projectVersion=1.0

# Source code
sonar.sources=app/src/main
sonar.tests=app/src/test

# Java settings
sonar.java.source=17
sonar.java.target=17
sonar.java.binaries=app/build/classes/java/main
sonar.java.test.binaries=app/build/classes/java/test

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/build/**,**/generated/**,**/*.class
sonar.test.exclusions=**/build/**,**/generated/**

# Coverage (if using JaCoCo)
# sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/test/jacocoTestReport.xml

# Language
sonar.language=java

